name: Provision Cosmos DB Free Tier

# Provisions only the Cosmos DB Free Tier resources by running infra/main.bicep.
# Authentication uses an Azure service principal secret because OIDC token
# issuance can be blocked by tenant Conditional Access policies.
#
# Required GitHub Actions secret (Settings -> Secrets and variables -> Actions):
#   AZURE_CREDENTIALS - JSON credentials for an Azure service principal:
#     {
#       "clientId": "<application-client-id>",
#       "clientSecret": "<client-secret>",
#       "subscriptionId": "<subscription-id>",
#       "tenantId": "<tenant-id>"
#     }
#
# Optional GitHub Actions variables:
#   AZURE_RESOURCE_GROUP   - Resource group name (default: rg-strade-aperte)
#   AZURE_LOCATION         - Resource group location (default: westeurope)

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Resource group name'
        required: false
        default: ''
      location:
        description: 'Azure region for the resource group'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    name: Provision Cosmos DB
    env:
      RESOURCE_GROUP: ${{ github.event.inputs.resource_group || vars.AZURE_RESOURCE_GROUP || 'rg-strade-aperte' }}
      LOCATION: ${{ github.event.inputs.location || vars.AZURE_LOCATION || 'westeurope' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          set -euo pipefail
          CLIENT_ID="$(python3 -c 'import json, os; print(json.loads(os.environ["AZURE_CREDENTIALS"])["clientId"])')"
          CLIENT_SECRET="$(python3 -c 'import json, os; print(json.loads(os.environ["AZURE_CREDENTIALS"])["clientSecret"])')"
          SUBSCRIPTION_ID="$(python3 -c 'import json, os; print(json.loads(os.environ["AZURE_CREDENTIALS"])["subscriptionId"])')"
          TENANT_ID="$(python3 -c 'import json, os; print(json.loads(os.environ["AZURE_CREDENTIALS"])["tenantId"])')"

          az login \
            --service-principal \
            --username "$CLIENT_ID" \
            --password "$CLIENT_SECRET" \
            --tenant "$TENANT_ID" \
            --output none
          az account set --subscription "$SUBSCRIPTION_ID"

      - name: Create resource group
        run: az group create --name "$RESOURCE_GROUP" --location "$LOCATION" --output none

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --query "properties.outputs" -o json
