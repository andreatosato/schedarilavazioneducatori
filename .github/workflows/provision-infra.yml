name: Provision Cosmos DB Free Tier

# Provisions only the Cosmos DB Free Tier resources by running infra/main.bicep.
# Authentication uses an Azure service principal secret because OIDC token
# issuance can be blocked by tenant Conditional Access policies.
#
# Required GitHub Actions secret (Settings -> Secrets and variables -> Actions):
#   AZURE_CREDENTIALS - JSON credentials for an Azure service principal:
#     {
#       "clientId": "<application-client-id>",
#       "clientSecret": "<client-secret>",
#       "subscriptionId": "<subscription-id>",
#       "tenantId": "<tenant-id>"
#     }
#
# Optional GitHub Actions variables:
#   AZURE_RESOURCE_GROUP   - Resource group name (default: rg-strade-aperte)
#   AZURE_LOCATION         - Resource group location (default: westeurope)

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Resource group name'
        required: false
        default: ''
      location:
        description: 'Azure region for the resource group'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    name: Provision Cosmos DB
    env:
      RESOURCE_GROUP: ${{ github.event.inputs.resource_group || vars.AZURE_RESOURCE_GROUP || 'rg-strade-aperte' }}
      LOCATION: ${{ github.event.inputs.location || vars.AZURE_LOCATION || 'westeurope' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare Azure credentials
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          set +x
          set -euo pipefail
          credentials_file="$(mktemp)"
          trap 'rm -f "$credentials_file"' EXIT
          export CREDENTIALS_FILE="$credentials_file"

          python3 <<'PY'
          import json
          import os
          import shlex

          raw_credentials = os.environ.get("AZURE_CREDENTIALS", "")
          try:
              credentials = json.loads(raw_credentials)
          except json.JSONDecodeError as error:
              raise SystemExit(f"AZURE_CREDENTIALS is not valid JSON: {error}") from error

          variables = {
              "AZURE_CLIENT_ID": "clientId",
              "AZURE_CLIENT_SECRET": "clientSecret",
              "AZURE_SUBSCRIPTION_ID": "subscriptionId",
              "AZURE_TENANT_ID": "tenantId",
          }
          missing = [key for key in variables.values() if not credentials.get(key)]
          if missing:
              raise SystemExit(f"AZURE_CREDENTIALS is missing required field(s): {', '.join(missing)}")

          with open(os.environ["CREDENTIALS_FILE"], "w", encoding="utf-8") as credentials_file:
              for variable, key in variables.items():
                  print(f"{variable}={shlex.quote(credentials[key])}", file=credentials_file)
          PY

          . "$credentials_file"
          printf '::add-mask::%s\n' "$AZURE_CLIENT_SECRET"
          {
            printf 'AZURE_CLIENT_ID=%s\n' "$AZURE_CLIENT_ID"
            printf 'AZURE_CLIENT_SECRET=%s\n' "$AZURE_CLIENT_SECRET"
            printf 'AZURE_SUBSCRIPTION_ID=%s\n' "$AZURE_SUBSCRIPTION_ID"
            printf 'AZURE_TENANT_ID=%s\n' "$AZURE_TENANT_ID"
          } >> "$GITHUB_ENV"

      - name: Azure login
        run: |
          set -euo pipefail
          az login \
            --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Create resource group
        run: az group create --name "$RESOURCE_GROUP" --location "$LOCATION" --output none

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --query "properties.outputs" -o json
