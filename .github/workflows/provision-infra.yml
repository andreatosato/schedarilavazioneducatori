name: Provision Cosmos DB Free Tier

# Provisions only the Cosmos DB Free Tier resources by running infra/main.bicep.
# Authentication uses an Azure service principal secret because OIDC token
# issuance can be blocked by tenant Conditional Access policies.
#
# Required GitHub Actions secrets (Settings -> Secrets and variables -> Actions):
#   AZURE_CLIENT_ID        - Application (client) ID of the Entra ID app/service principal
#   AZURE_CLIENT_SECRET    - Client secret of the Entra ID app/service principal
#   AZURE_TENANT_ID        - Entra ID tenant ID
#   AZURE_SUBSCRIPTION_ID  - Target Azure subscription ID
#
# Optional GitHub Actions variables:
#   AZURE_RESOURCE_GROUP   - Resource group name (default: rg-strade-aperte)
#   AZURE_LOCATION         - Resource group location (default: westeurope)

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Resource group name'
        required: false
        default: ''
      location:
        description: 'Azure region for the resource group'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    name: Provision Cosmos DB
    env:
      RESOURCE_GROUP: ${{ github.event.inputs.resource_group || vars.AZURE_RESOURCE_GROUP || 'rg-strade-aperte' }}
      LOCATION: ${{ github.event.inputs.location || vars.AZURE_LOCATION || 'westeurope' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          az login \
            --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Create resource group
        run: az group create --name "$RESOURCE_GROUP" --location "$LOCATION" --output none

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --query "properties.outputs" -o json
