name: Provision Azure Infrastructure

# Provisions ALL the Azure infrastructure (Static Web App + Cosmos DB) by
# running infra/main.bicep. Authentication uses OpenID Connect (OIDC) with a
# federated credential, so NO long-lived secret/password is stored in the repo.
#
# Required GitHub Actions secrets (Settings -> Secrets and variables -> Actions):
#   AZURE_CLIENT_ID        - Application (client) ID of the Entra ID app/service principal
#   AZURE_TENANT_ID        - Entra ID tenant ID
#   AZURE_SUBSCRIPTION_ID  - Target Azure subscription ID
#
# Optional GitHub Actions variables:
#   AZURE_RESOURCE_GROUP   - Resource group name (default: rg-strade-aperte)
#   AZURE_LOCATION         - Resource group location (default: westeurope)

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Resource group name'
        required: false
        default: ''
      location:
        description: 'Azure region for the resource group'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    name: Provision infrastructure
    env:
      RESOURCE_GROUP: ${{ github.event.inputs.resource_group || vars.AZURE_RESOURCE_GROUP || 'rg-strade-aperte' }}
      LOCATION: ${{ github.event.inputs.location || vars.AZURE_LOCATION || 'westeurope' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create resource group
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az group create --name "$RESOURCE_GROUP" --location "$LOCATION"

      - name: Deploy Bicep
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az deployment group create \
              --resource-group "$RESOURCE_GROUP" \
              --template-file infra/main.bicep \
              --parameters infra/main.bicepparam \
              --query "properties.outputs" -o json
