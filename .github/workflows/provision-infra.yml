name: Provision Cosmos DB Free Tier

# Provisions only the Cosmos DB Free Tier resources by running infra/main.bicep.
# Authentication uses an Azure service principal secret because OIDC token
# issuance can be blocked by tenant Conditional Access policies.
#
# Required GitHub Actions secrets (Settings -> Secrets and variables -> Actions):
#   AZURE_CLIENT_ID        - Application (client) ID of the Entra ID app/service principal
#   AZURE_CLIENT_SECRET    - Client secret of the Entra ID app/service principal
#   AZURE_TENANT_ID        - Entra ID tenant ID
#   AZURE_SUBSCRIPTION_ID  - Target Azure subscription ID
#
# Optional GitHub Actions variables:
#   AZURE_RESOURCE_GROUP   - Resource group name (default: rg-stradeaperte)
#   AZURE_LOCATION         - Resource group location (default: italynorth)

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: 'Resource group name'
        required: false
        default: ''
      location:
        description: 'Azure region for the resource group'
        required: false
        default: ''
      mode:
        description: 'Use validate unless the service principal is allowed by tenant Conditional Access policies'
        required: true
        default: 'validate'
        type: choice
        options:
          - validate
          - deploy

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    name: Provision Cosmos DB
    env:
      RESOURCE_GROUP: ${{ github.event.inputs.resource_group || vars.AZURE_RESOURCE_GROUP || 'rg-stradeaperte' }}
      LOCATION: ${{ github.event.inputs.location || vars.AZURE_LOCATION || 'italynorth' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Bicep
        run: |
          set -euo pipefail
          az bicep build --file infra/main.bicep --outfile "$RUNNER_TEMP/main.json"
          echo "Bicep template validation successful."

      - name: Manual deployment instructions
        if: ${{ github.event.inputs.mode != 'deploy' }}
        run: |
          cat <<EOF
          Bicep validation completed.

          This workflow did not contact Azure because mode=validate. To provision
          Cosmos DB from a trusted Azure session, run:

            az group create --name "$RESOURCE_GROUP" --location "$LOCATION"
            az deployment group create \
              --resource-group "$RESOURCE_GROUP" \
              --template-file infra/main.bicep \
              --parameters infra/main.bicepparam \
              --query "properties.outputs" -o json

          If you want GitHub Actions to deploy, re-run this workflow with
          mode=deploy after the service principal has been allowed by tenant
          Conditional Access policies.
          EOF

      - name: Azure login
        if: ${{ github.event.inputs.mode == 'deploy' }}
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          login_error="$RUNNER_TEMP/azure-login-error.log"
          az login \
            --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" \
            --output none 2>"$login_error" || {
              status=$?
              cat "$login_error" >&2
              if grep -q 'AADSTS53003' "$login_error"; then
                echo "::error::Azure blocked token issuance with AADSTS53003."
                echo "::error::Run mode=validate and deploy from Azure Cloud Shell/trusted session, or ask the tenant administrator to allow this service principal in Conditional Access policies."
              fi
              exit "$status"
            }
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"

      - name: Create resource group
        if: ${{ github.event.inputs.mode == 'deploy' }}
        run: az group create --name "$RESOURCE_GROUP" --location "$LOCATION" --output none

      - name: Deploy Bicep
        if: ${{ github.event.inputs.mode == 'deploy' }}
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --query "properties.outputs" -o json
