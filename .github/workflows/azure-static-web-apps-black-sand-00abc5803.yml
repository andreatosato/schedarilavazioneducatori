name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
      pull-requests: write
      id-token: write # Required for the OIDC (workload identity) Azure login
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_SAND_00ABC5803 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # App source code path
          api_location: "api" # Azure Functions source code path
          output_location: "." # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

      # Authenticate to Azure with OpenID Connect (workload identity federation)
      # instead of a service-principal password. Password-based logins are rejected
      # by the tenant Conditional Access policy (AADSTS53003), which is why the
      # COSMOS update was previously skipped. The federated OIDC
      # token is the supported way to let GitHub Actions update the setting and
      # requires a federated credential on the app registration plus the
      # `id-token: write` permission declared above.
      - name: Azure login (OIDC)
        id: azure_login
        if: github.event_name == 'push'
        continue-on-error: true
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Publish the Cosmos DB account endpoint as an application setting so the
      # Azure Functions API can authenticate to Cosmos DB with Microsoft Entra
      # ID (the Static Web App managed identity) instead of an account key. This
      # is required when the Cosmos account disables local (key-based)
      # authorization. The setting is only applied to the production environment
      # on pushes to main; pull-request staging environments do not inherit app
      # settings.
      - name: Configure Cosmos DB endpoint
        if: github.event_name == 'push'
        env:
          STATIC_WEB_APP_NAME: black-sand-00abc5803
          RESOURCE_GROUP: rg-stradeaperte
          COSMOS_ACCOUNT_NAME: black-sand-00abc5803-cosmos
        run: |
          set -euo pipefail
          if [ "${{ steps.azure_login.outcome }}" != "success" ]; then
            echo "::warning::Skipping COSMOS_ENDPOINT update because the Azure login step failed. Configure a federated credential (OIDC) on the service principal, or exclude it from the Conditional Access policy, so the setting can be applied. Cosmos-backed API calls may fail until then."
            exit 0
          fi
          COSMOS_ENDPOINT=$(az cosmosdb show \
            --name "$COSMOS_ACCOUNT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "documentEndpoint" -o tsv)
          az staticwebapp appsettings set \
            --name "$STATIC_WEB_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --setting-names "COSMOS_ENDPOINT=$COSMOS_ENDPOINT" >/dev/null
          echo "COSMOS_ENDPOINT application setting updated on $STATIC_WEB_APP_NAME."
          az logout || true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    permissions:
      pull-requests: write
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_SAND_00ABC5803 }}
          action: "close"
