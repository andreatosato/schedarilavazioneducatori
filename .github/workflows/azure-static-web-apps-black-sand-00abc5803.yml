name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
      pull-requests: write
      id-token: write # Required for the OIDC (workload identity) Azure login
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STRADEAPERTE20260625 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # App source code path
          # The API is hosted on a standalone "bring your own" Function App
          # (linked to this Static Web App), not as SWA-managed Functions, so no
          # api_location is built/deployed here. The Function App is published in
          # the "Deploy API to Function App" step below.
          api_location: ""
          output_location: "." # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

      # Authenticate to Azure with OpenID Connect (workload identity federation)
      # instead of a service-principal password. Password-based logins are rejected
      # by the tenant Conditional Access policy (AADSTS53003), which is why the
      # COSMOS update was previously skipped. The federated OIDC
      # token is the supported way to let GitHub Actions update the setting and
      # requires a federated credential on the app registration plus the
      # `id-token: write` permission declared above.
      - name: Azure login (OIDC)
        id: azure_login
        if: github.event_name == 'push'
        continue-on-error: true
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Publish the API to the standalone "bring your own" Function App. A
      # dedicated Function App (unlike the SWA managed Functions) supports
      # managed identity, so it can authenticate to Cosmos DB with Microsoft
      # Entra ID. COSMOS_ENDPOINT is set on the Function App by the Bicep
      # template; here we only deploy the code. This runs only on pushes to
      # main; pull-request staging environments are not updated.
      - name: Deploy API to Function App
        if: github.event_name == 'push'
        env:
          FUNCTION_APP_NAME: stradeaperte20260625-api
          RESOURCE_GROUP: rg-stradeaperte-v2
        run: |
          set -euo pipefail
          if [ "${{ steps.azure_login.outcome }}" != "success" ]; then
            echo "::warning::Skipping Function App deploy because the Azure login step failed. Configure a federated credential (OIDC) on the service principal so the API can be published. Cosmos-backed API calls may fail until then."
            exit 0
          fi
          pushd api >/dev/null
          npm ci --omit=dev
          zip -r ../api.zip . -x "test/*" "*.test.js" >/dev/null
          popd >/dev/null
          storage_uri=$(az functionapp config appsettings list \
            --name "$FUNCTION_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "[?name=='AzureWebJobsStorage__blobServiceUri'].value | [0]" -o tsv)
          storage_account=$(printf '%s\n' "$storage_uri" | sed -E 's#^https://([^.]+)\.blob\.core\.windows\.net/?$#\1#')
          if [ -z "$storage_account" ] || [ "$storage_account" = "$storage_uri" ]; then
            echo "::error::Unable to resolve the Function App storage account from AzureWebJobsStorage__blobServiceUri."
            exit 1
          fi
          package_container="packages"
          package_blob="api.zip"
          az storage container create \
            --account-name "$storage_account" \
            --name "$package_container" \
            --auth-mode login \
            --query created -o tsv >/dev/null
          az storage blob upload \
            --account-name "$storage_account" \
            --container-name "$package_container" \
            --name "$package_blob" \
            --file api.zip \
            --overwrite true \
            --auth-mode login \
            --query name -o tsv >/dev/null
          expiry=$(date -u -d '+6 days' '+%Y-%m-%dT%H:%MZ')
          sas=$(az storage blob generate-sas \
            --account-name "$storage_account" \
            --container-name "$package_container" \
            --name "$package_blob" \
            --permissions r \
            --expiry "$expiry" \
            --auth-mode login \
            --as-user \
            --https-only -o tsv)
          if [ -z "$sas" ]; then
            echo "::error::Unable to generate a user delegation SAS for the Function App package. Ensure the GitHub Azure identity has Storage Blob Data Contributor and Storage Blob Delegator on the Function App storage account."
            exit 1
          fi
          package_url="https://${storage_account}.blob.core.windows.net/${package_container}/${package_blob}?${sas}"
          az functionapp config appsettings set \
            --name "$FUNCTION_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --settings "WEBSITE_RUN_FROM_PACKAGE=$package_url" \
            --query "[].name" -o json >/dev/null
          unset sas package_url
          az functionapp restart \
            --name "$FUNCTION_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" >/dev/null
          echo "API deployed to Function App $FUNCTION_APP_NAME."
          az logout || true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    permissions:
      pull-requests: write
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STRADEAPERTE20260625 }}
          action: "close"
