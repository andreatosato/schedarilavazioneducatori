name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_SAND_00ABC5803 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # App source code path
          api_location: "api" # Azure Functions source code path
          output_location: "." # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

      # Publish the Cosmos DB connection string as an application setting so the
      # Azure Functions API (and the Data API Builder) can read COSMOS_CONNECTIONSTRING
      # at runtime. The setting is only applied to the production environment on
      # pushes to main; pull-request staging environments do not inherit app settings.
      - name: Configure Cosmos DB connection string
        if: github.event_name == 'push'
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          STATIC_WEB_APP_NAME: black-sand-00abc5803
          RESOURCE_GROUP: rg-stradeaperte
          COSMOS_ACCOUNT_NAME: black-sand-00abc5803-cosmos
        run: |
          set -euo pipefail
          AZ_LOGIN_ERROR_LOG="$(mktemp)"
          trap 'rm -f "$AZ_LOGIN_ERROR_LOG"' EXIT
          if ! az login --service-principal \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET" \
            --tenant "$AZURE_TENANT_ID" >/dev/null 2>"$AZ_LOGIN_ERROR_LOG"; then
            if grep -Eq "AADSTS53003|Access has been blocked by Conditional Access policies" "$AZ_LOGIN_ERROR_LOG" 2>/dev/null; then
              echo "::warning::Skipping COSMOS_CONNECTIONSTRING update because Conditional Access blocked service principal login. Cosmos-backed API calls may fail until the setting is applied."
              exit 0
            fi
            cat "$AZ_LOGIN_ERROR_LOG" >&2
            exit 1
          fi
          az account set --subscription "$AZURE_SUBSCRIPTION_ID"
          COSMOS_CONNECTIONSTRING=$(az cosmosdb keys list \
            --name "$COSMOS_ACCOUNT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --type connection-strings \
            --query "connectionStrings[0].connectionString" -o tsv)
          az staticwebapp appsettings set \
            --name "$STATIC_WEB_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --setting-names "COSMOS_CONNECTIONSTRING=$COSMOS_CONNECTIONSTRING" >/dev/null
          echo "COSMOS_CONNECTIONSTRING application setting updated on $STATIC_WEB_APP_NAME."
          az logout || true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    permissions:
      pull-requests: write
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_SAND_00ABC5803 }}
          action: "close"
